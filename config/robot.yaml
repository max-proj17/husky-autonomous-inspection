# Clearpath Robotics reads this file and generates the full robot urdf,
# launch files, and controller config
# You can add another host, such as a offboard-computer
serial_number: a200-0000
version: 0
system:
  username: administrator
  hosts:
    - hostname: cpr-a200-0000           # Robot's hostname on the network
      ip: 192.168.131.1                 # Default Clearpath robot IP
  ros2:
    namespace: a200_0000
    domain_id: 0                        # ROS2 DDS domain
    rmw_implementation: rmw_fastrtps_cpp
    workspaces: []                      # ROS2 package directories

platform:
  controller: ps4
  battery:
    model: ES20_12C 
    configuration: S2P1
  attachments:
    - name: front_bumper
      type: a200.bumper
      model: default
      parent: front_bumper_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true
    - name: rear_bumper
      type: a200.bumper
      model: default
      parent: rear_bumper_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true
    - name: top_plate
      type: a200.top_plate
      model: large
      parent: default_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true

sensors:
  lidar3d:
    - model: velodyne_lidar
      urdf_enabled: true
      launch_enabled: true
      parent: top_plate_link
      xyz: [0.0, 0.0, 0.1]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        velodyne_driver:
          device_ip: 192.168.131.20
          port: 2368
          model: VLP16
